services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docsignal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/docsignal
      GROQ_API_KEY: ${GROQ_API_KEY}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - fastembed_cache:/root/.cache/huggingface

volumes:
  pgdata:
  fastembed_cache:
